services:
  - type: web
    name: real-estate-growth-prediction
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: cyberjoar
      - key: MONGODB_COLLECTION
        value: real_estate_zones